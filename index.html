<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>룸체크 (RoomCheck)</title>
  <!-- Stlite 구동을 위한 CSS와 JS 로드 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/browser@1.8.0/build/stlite.css" />
  <script type="module" src="https://cdn.jsdelivr.net/npm/@stlite/browser@1.8.0/build/stlite.js"></script>
</head>
<body>
  <!-- 브라우저에서 실행할 Streamlit 환경 설정 -->
  <streamlit-app src="./app.py">
    <!-- 함께 불러올 로컬 데이터 파일 등록 -->
    <app-file name="cctv_cleaned.csv" url="./cctv_cleaned.csv"></app-file>
    
    <!-- 설치가 필요한 Python 라이브러리 지정 -->
    <app-requirements>
      requests
      plotly
    </app-requirements>
  </streamlit-app>
</body>
</html>
